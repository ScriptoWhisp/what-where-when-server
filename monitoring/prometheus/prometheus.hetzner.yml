global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # On Hetzner the app is started via pm2 on the host. Prometheus runs in
  # Docker, so it should scrape the host via Docker's gateway IP.
  #
  # If you run Prometheus with host networking, you can replace this with
  # 127.0.0.1:3000.
  - job_name: "server"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3000"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

